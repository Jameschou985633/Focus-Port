<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>系统管理后台 - 智能全真试卷编辑中心</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #1e1e2f; color: #d4d4d8; padding: 20px; margin: 0;}
        .main-wrapper { display: flex; gap: 20px; max-width: 1400px; margin: 0 auto; align-items: flex-start;}
        .container { flex: 2; background: #27273a; padding: 30px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); margin-bottom: 20px;}
        .ai-sidebar { flex: 1; background: #1e1e2f; border: 2px solid #3b82f6; padding: 25px; border-radius: 12px; position: sticky; top: 20px;}

        h2 { color: #3b82f6; border-bottom: 2px solid #3b82f6; padding-bottom: 10px; margin-top: 0;}
        label { font-weight: bold; margin-top: 15px; display: block; color: #a78bfa;}
        input[type="text"], input[type="number"], input[type="password"], textarea, select { width: 100%; padding: 12px; margin-top: 5px; background: #1e1e2f; border: 1px solid #3f3f46; color: #fff; border-radius: 6px; box-sizing: border-box; font-family: monospace; font-size: 14px;}
        input:focus, textarea:focus, select:focus { border-color: #3b82f6; outline: none; }

        .btn { padding: 10px 20px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 15px; transition: 0.3s; color: white; margin-top: 15px;}
        .btn-blue { background: #3b82f6; } .btn-blue:hover { background: #2563eb; }
        .btn-green { background: #10b981; } .btn-green:hover { background: #059669; }
        .btn-purple { background: #8b5cf6; } .btn-purple:hover { background: #7c3aed; }
        .btn-orange { background: #f59e0b; } .btn-orange:hover { background: #d97706; }

        .flex-row { display: flex; gap: 15px; flex-wrap: wrap;} .flex-row > div { flex: 1; min-width: 200px;}
        .upload-section { background: #312e81; padding: 25px; border-radius: 8px; border: 2px dashed #6366f1; text-align: center; transition: 0.3s;}
        .upload-section:hover { border-color: #10b981; background: #2e3165; }

        .module-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 10px; margin-top: 15px; }
        .module-card { background: #1e1e2f; border: 1px solid #3f3f46; padding: 10px 15px; border-radius: 8px; display: flex; align-items: center; cursor: pointer;}
        .module-card:hover { border-color: #3b82f6; }
        .module-card input { margin-right: 10px; transform: scale(1.2); cursor: pointer; accent-color: #3b82f6;}

        .ans-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; margin-top: 15px; background: #181825; padding: 15px; border-radius: 8px;}
        .ans-cell { background: #27273a; padding: 8px; border-radius: 6px; border: 1px solid #3f3f46; display: flex; flex-direction: column; gap: 5px; text-align: center;}
        .ans-cell span { font-weight: bold; color: #3b82f6; font-size: 14px;}
        .ans-cell input { margin: 0; padding: 6px; text-align: center; border-radius: 4px; font-size: 14px;}
        .ans-input { border-color: #10b981 !important; color: #10b981 !important; font-weight: bold;}
        .weight-input { border-color: #8b5cf6 !important; color: #8b5cf6 !important; font-size: 12px !important;}
    </style>
</head>
<body>

<div class="main-wrapper">
    <div class="container" style="flex: 2;">
        <h2>📂 多媒体资源库 (可视化上传)</h2>
        <div class="upload-section">
            <input type="file" id="file-input" style="display: none;" onchange="updateFileName()">
            <label for="file-input" class="btn btn-purple" style="display: inline-block; cursor: pointer; font-size: 16px;">📁 点击选择文件 (PDF/Word/音频)</label>
            <div style="margin-top: 15px;">
                <span id="file-name-display" style="color: #9ca3af; font-size: 15px;">当前未选择任何文件...</span>
            </div>
            <button id="upload-btn" class="btn btn-green" style="width: 60%; font-size: 16px; margin-top: 20px;" onclick="uploadResource()">📤 确认上传至服务器</button>
        </div>

        <h2 style="margin-top: 30px;">⚙️ 全真考场生成器</h2>
        <div style="display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap;">
            <button class="btn btn-purple" onclick="switchTemplate('cet6')">🎓 载入标准六级考场</button>
            <button class="btn btn-purple" onclick="switchTemplate('neccs')">🏆 载入标准大英赛</button>
            <button class="btn btn-orange" onclick="switchTemplate('mini')">⏱️ 载入每日专项小测</button>
        </div>

        <div class="flex-row">
            <div><label>📌 试卷代号 (须唯一)</label><input type="text" id="exam-code"></div>
            <div><label>🏷️ 试卷展示名称</label><input type="text" id="exam-title"></div>
            <div><label>⏱️ 考试限时 (分钟)</label><input type="number" id="time-limit" value="130"></div>
        </div>
        <div class="flex-row">
            <div><label>🎵 绑定音频文件</label><input type="text" id="audio-file" placeholder="如: cet6_audio.mp3"></div>
            <div><label>📄 绑定解析文档 (Word/PDF)</label><input type="text" id="pdf-file" placeholder="如: 2023大英赛解析.docx"></div>
        </div>

        <label style="margin-top: 25px;">🧩 勾选组卷模块 (高保真排版)：</label>
        <div class="module-grid" id="module-container"></div>

        <button class="btn btn-blue" style="margin-top: 20px; width: 100%;" onclick="generateAnswerGrid()">👇 生成客观题【极速录入网格】</button>

        <div id="answer-section" style="display: none; margin-top: 30px; border-top: 2px dashed #3f3f46; padding-top: 20px;">
            <label>✅ 客观题答案录入 (支持按 Tab 键极速切换。开放性题目请直接留空！)</label>
            <div class="ans-grid" id="ans-grid-container"></div>

            <label>🤖 AI 主观题算分标准与范文 (AI Prompt)</label>
            <textarea id="ai-prompt" rows="8" placeholder="提取出来的简答题、翻译题、作文的参考答案会自动补充到这里..."></textarea>

            <button class="btn btn-green" style="width: 100%; font-size: 18px; padding: 15px; margin-top: 25px;" onclick="saveExam()">💾 保存试卷并发布至学生考场</button>
        </div>

        <!-- 考试管理区域 -->
        <div style="margin-top: 40px; padding-top: 30px; border-top: 2px solid #3b82f6;">
            <h2>📋 已发布考试管理</h2>
            <div style="display: flex; gap: 10px; margin-bottom: 20px;">
                <button class="btn btn-blue" onclick="loadExams()">🔄 刷新列表</button>
                <button class="btn btn-orange" onclick="batchGrade()">🤖 批量AI批改</button>
            </div>
            <div id="exam-list" style="display: grid; gap: 10px;"></div>
        </div>

        <!-- 提交记录区域 -->
        <div style="margin-top: 30px; padding-top: 20px; border-top: 1px dashed #3f3f46;">
            <h2>📊 学生提交记录</h2>
            <select id="filter-exam" style="margin-bottom: 15px;" onchange="loadSubmissions()">
                <option value="">全部考试</option>
            </select>
            <div id="submission-list" style="display: grid; gap: 8px; max-height: 400px; overflow-y: auto;"></div>
        </div>
    </div>

    <div class="ai-sidebar">
        <h2 style="color: #fbbf24; border-bottom-color: #fbbf24;">🪄 卷宗 AI 透视眼</h2>
        <p style="font-size: 0.9em; color: #9ca3af; line-height: 1.6;">无需再手动复制粘贴！只要左侧填好了文档名，DeepSeek 就会利用超大上下文直接通读全卷，并自动剥离初赛或决赛！</p>

        <label>🔑 你的 DeepSeek API Key：</label>
        <input type="password" id="admin-api-key" placeholder="sk-..." onblur="saveKey()">

        <label style="margin-top: 15px;">🎯 提取目标 (防混淆指令)：</label>
        <select id="target-exam" style="background: #27273a; font-weight: bold; color: #10b981;">
            <option value="初赛">🥇 仅提取【初赛】的答案</option>
            <option value="决赛">🏆 仅提取【决赛】的答案</option>
            <option value="全部">📝 这是六级或单套卷，直接提取全部</option>
        </select>

        <button id="ai-btn" class="btn btn-orange" style="width: 100%; font-size: 16px; padding: 15px;" onclick="callAIParser()">🤖 直接读取文档并智能填充</button>
    </div>
</div>

<script>
    document.getElementById('admin-api-key').value = localStorage.getItem('adminApiKey') || '';
    function saveKey() { localStorage.setItem('adminApiKey', document.getElementById('admin-api-key').value); }

    // 🌟 交互升级 1：优雅的文件选择提示
    function updateFileName() {
        const fileInput = document.getElementById('file-input');
        const display = document.getElementById('file-name-display');
        if (fileInput.files.length > 0) {
            display.innerText = "✅ 已选中文件: " + fileInput.files[0].name;
            display.style.color = "#10b981";
            display.style.fontWeight = "bold";
        } else {
            display.innerText = "当前未选择任何文件...";
            display.style.color = "#9ca3af";
            display.style.fontWeight = "normal";
        }
    }

    // 🌟 交互升级 2：带有 Loading 状态的上传按钮
    async function uploadResource() {
        const fileInput = document.getElementById('file-input');
        const uploadBtn = document.getElementById('upload-btn');
        const display = document.getElementById('file-name-display');

        if (fileInput.files.length === 0) return alert("请先点击上方紫色按钮选择文件！");

        // 进入 Loading 状态
        uploadBtn.innerText = "⏳ 正在拼命上传中，请稍候...";
        uploadBtn.disabled = true;
        uploadBtn.style.background = "#4b5563"; // 变成灰色

        const formData = new FormData();
        formData.append("file", fileInput.files[0]);

        try {
            const res = await fetch('/api/admin/upload', { method: 'POST', body: formData });
            const data = await res.json();
            alert("✅ " + data.message);
            // 传完后重置输入框
            fileInput.value = "";
            display.innerText = "当前未选择任何文件...";
            display.style.color = "#9ca3af";
            display.style.fontWeight = "normal";
        } catch (error) {
            alert("❌ 上传失败，请检查网络或确认 Python 后端是否运行。");
        } finally {
            // 恢复按钮状态
            uploadBtn.innerText = "📤 确认上传至服务器";
            uploadBtn.disabled = false;
            uploadBtn.style.background = "#10b981";
        }
    }

    // 🌟 题号修正：完美适配大英赛真实排版
    const DB_TEMPLATES = {
        'cet6': [
            { id: 'c1', title: "Part I. Writing", start: 1, end: 1, type: "textarea", height: "250px", hasObj: false },
            { id: 'c2', title: "Part II. Listening A&B", start: 2, end: 16, type: "choice", defaultWeight: 7.1, hasObj: true },
            { id: 'c3', title: "Part II. Listening C", start: 17, end: 26, type: "choice", defaultWeight: 14.2, hasObj: true },
            { id: 'c4', title: "Part III. Blank", start: 27, end: 36, type: "blank", placeholder: "填字母", defaultWeight: 3.55, hasObj: true },
            { id: 'c5', title: "Part III. Match", start: 37, end: 46, type: "blank", placeholder: "填字母", defaultWeight: 7.1, hasObj: true },
            { id: 'c6', title: "Part III. Reading", start: 47, end: 56, type: "choice", defaultWeight: 14.2, hasObj: true },
            { id: 'c7', title: "Part IV. Translation", start: 57, end: 57, type: "textarea", height: "200px", hasObj: false }
        ],
        'neccs': [
            { id: 'n1', title: "I. Listening Choice", start: 1, end: 20, type: "choice", defaultWeight: 1, hasObj: true },
            { id: 'n2', title: "I. Listening Blanks", start: 21, end: 25, type: "blank", placeholder: "填词", defaultWeight: 1, hasObj: true },
            { id: 'n3', title: "II. Vocab & Culture", start: 26, end: 40, type: "choice", defaultWeight: 1, hasObj: true },
            { id: 'n4', title: "III. Cloze", start: 41, end: 50, type: "blank", placeholder: "填词", defaultWeight: 1, hasObj: true },
            { id: 'n5', title: "IV. Reading Choice (阅读选择)", start: 51, end: 55, type: "choice_extended", defaultWeight: 1, hasObj: true },
            { id: 'n6', title: "IV. Reading Short (阅读简答)", start: 56, end: 65, type: "blank", placeholder: "简答", defaultWeight: 2, hasObj: true },
            { id: 'n7', title: "V. Translation (翻译)", start: 66, end: 67, type: "textarea", height: "150px", hasObj: false },
            { id: 'n8', title: "VI. IQ Test (智力测试)", start: 68, end: 72, type: "blank", placeholder: "答案", defaultWeight: 1, hasObj: true },
            { id: 'n9', title: "VII. Error Correction (改错)", start: 73, end: 82, type: "blank", placeholder: "改错", defaultWeight: 1, hasObj: true },
            { id: 'n10', title: "VIII. Writing (写作)", start: 83, end: 84, type: "textarea", height: "250px", hasObj: false }
        ],
        'mini': [
            { id: 'm1', title: "翻译小练习", start: 1, end: 1, type: "textarea", height: "200px", hasObj: false }
        ]
    };

    let currentModules = [];

    function switchTemplate(type) {
        currentModules = DB_TEMPLATES[type];
        const container = document.getElementById('module-container');
        container.innerHTML = '';
        currentModules.forEach((mod, index) => {
            container.innerHTML += `
                <label class="module-card">
                    <input type="checkbox" id="chk-${index}" value="${index}" checked>
                    <span style="font-weight:bold; color:#a78bfa;">${mod.title} <span style="font-size:0.8em; color:#6b7280;">(Q${mod.start}-Q${mod.end})</span></span>
                </label>`;
        });

        if (type === 'cet6') {
            document.getElementById('exam-code').value = 'cet6_2024'; document.getElementById('exam-title').value = '🎓 大学英语六级 全真模考';
            document.getElementById('time-limit').value = 130; document.getElementById('ai-prompt').value = '【六级满分标准：写作106.5分，翻译106.5分】\n';
            document.getElementById('target-exam').value = '全部';
        } else if (type === 'neccs') {
            document.getElementById('exam-code').value = 'neccs_2023_pre'; document.getElementById('exam-title').value = '🏆 大英赛 (初赛)';
            document.getElementById('time-limit').value = 120; document.getElementById('ai-prompt').value = '【大英赛满分标准：简答/智力/改错每题记分，翻译/作文请给出总分并附范文】\n';
            document.getElementById('target-exam').value = '初赛';
        } else {
            document.getElementById('exam-code').value = 'mini_test_01'; document.getElementById('exam-title').value = '⏱️ 每日特训';
            document.getElementById('time-limit').value = 40; document.getElementById('ai-prompt').value = '翻译满分15分...';
        }
        document.getElementById('answer-section').style.display = 'none';
    }

    function generateAnswerGrid() {
        const gridContainer = document.getElementById('ans-grid-container');
        gridContainer.innerHTML = ''; let hasObj = false;
        currentModules.forEach((mod, index) => {
            if (document.getElementById(`chk-${index}`).checked && mod.hasObj) {
                hasObj = true;
                for (let i = mod.start; i <= mod.end; i++) {
                    gridContainer.innerHTML += `
                        <div class="ans-cell"><span>Q${i}</span>
                        <input type="text" class="ans-input" id="ans-q${i}" placeholder="答案" autocomplete="off">
                        <input type="number" step="0.01" class="weight-input" id="weight-q${i}" value="${mod.defaultWeight}" title="分值"></div>`;
                }
            }
        });
        if (!hasObj) gridContainer.innerHTML = '<p style="color:#9ca3af; grid-column: 1 / -1; text-align:center;">全是主观题模块，无需客观题答案~</p>';
        document.getElementById('answer-section').style.display = 'block';
    }

// 🌟 全自动直读 PDF/Word 的 AI 魔法（带强力监控版）
    async function callAIParser() {
        const apiKey = document.getElementById('admin-api-key').value.trim();
        const pdfFileName = document.getElementById('pdf-file').value.trim();
        const targetExam = document.getElementById('target-exam').value;

        if(!apiKey) return alert("请先填入 DeepSeek API Key！");
        if(!pdfFileName) return alert("请在左侧【绑定解析文档】栏填写你要提取的文件名！");

        const btn = document.getElementById('ai-btn');
        btn.innerText = "⏳ DeepSeek 正在火速通读全卷..."; btn.disabled = true;
        btn.style.background = "#4b5563";

        try {
            const res = await fetch('/api/admin/parse_answers', {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ api_key: apiKey, pdf_filename: pdfFileName, target_exam: targetExam })
            });
            if(!res.ok) throw new Error((await res.json()).detail);

            const data = await res.json();

            // 👇👇👇 开启上帝视角：把 AI 吐出的真实数据打印到浏览器控制台！
            console.log("========== 🤖 AI 提取的原始数据 ==========");
            console.log(data);
            console.log("==========================================");

            let fillCount = 0; // 记录成功填入了几个

            // 自动填充左侧的选择题网格（增强了容错能力，防止 AI 乱加字母）
            for(let q in data.obj_answers) {
                // 强制把 AI 返回的键名里所有非数字的字符去掉（比如把 "q51" 或 "第51题" 强行变成 "51"）
                let pureNumber = q.replace(/[^0-9]/g, '');

                const input = document.getElementById('ans-q' + pureNumber);
                if(input) {
                    input.value = data.obj_answers[q];
                    fillCount++;
                }
            }

            if(data.subj_prompt) {
                const promptBox = document.getElementById('ai-prompt');
                promptBox.value = promptBox.value + `\n\n【AI自动剥离的 ${targetExam} 参考答案】：\n` + data.subj_prompt;
            }

            alert(`🎉 提取成功！DeepSeek 已精准剥离【${targetExam}】的答案！\n成功为您自动填入了 ${fillCount} 个客观题格子！`);
        } catch (e) { alert("❌ " + e.message); }
        finally {
            btn.innerText = "🤖 直接读取文档并智能填充";
            btn.disabled = false;
            btn.style.background = "#f59e0b";
        }
    }

    function saveExam() {
        let finalConfig = [];
        currentModules.forEach((mod, index) => { if (document.getElementById(`chk-${index}`).checked) finalConfig.push(mod); });

        let finalAnsKey = {};
        document.querySelectorAll('.ans-input').forEach(input => {
            const qKey = input.id.replace('ans-', ''); const ansVal = input.value.trim();
            if (ansVal) finalAnsKey[qKey] = { ans: ansVal, weight: parseFloat(document.getElementById('weight-' + qKey).value) };
        });

        let data = {
            exam_code: document.getElementById('exam-code').value.trim(),
            title: document.getElementById('exam-title').value.trim(),
            audio_file: document.getElementById('audio-file').value.trim(),
            pdf_file: document.getElementById('pdf-file').value.trim(),
            time_limit: parseInt(document.getElementById('time-limit').value) || 120,
            config_json: JSON.stringify(finalConfig),
            answer_key_json: JSON.stringify(finalAnsKey),
            ai_prompt: document.getElementById('ai-prompt').value.trim()
        };

        if(!data.exam_code || !data.title) return alert("代号和名称不能为空！");
        fetch('/api/admin/save_exam', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(data) })
        .then(r => r.json()).then(d => { alert("✅ " + d.message); loadExams(); }).catch(e => alert("❌ 保存失败: " + e.message));
    }

    // 🌟 加载考试列表
    async function loadExams() {
        try {
            const res = await fetch('/api/admin/exams');
            const data = await res.json();
            const container = document.getElementById('exam-list');
            const filterSelect = document.getElementById('filter-exam');

            container.innerHTML = data.exams.map(exam => `
                <div class="exam-row" style="display: flex; align-items: center; gap: 15px; padding: 15px; background: #181825; border-radius: 10px;">
                    <span style="font-size: 24px;">📄</span>
                    <div style="flex: 1;">
                        <div style="font-weight: bold; color: #3b82f6;">${exam.title}</div>
                        <div style="font-size: 12px; color: #6b7280;">代号: ${exam.exam_code} | 限时: ${exam.time_limit}分钟</div>
                    </div>
                    <button class="btn btn-blue" style="padding: 6px 12px; font-size: 13px;" onclick="deleteExam('${exam.exam_code}')">🗑️ 删除</button>
                </div>
            `).join('') || '<p style="color: #6b7280;">暂无考试</p>';

            filterSelect.innerHTML = '<option value="">全部考试</option>' +
                data.exams.map(e => `<option value="${e.exam_code}">${e.title}</option>`).join('');

            loadSubmissions();
        } catch (e) {
            console.error('加载考试列表失败:', e);
        }
    }

    // 🌟 删除考试
    async function deleteExam(examCode) {
        if (!confirm(`确定要删除考试 ${examCode} 吗？此操作不可恢复！`)) return;
        try {
            const res = await fetch(`/api/admin/exam/${examCode}`, { method: 'DELETE' });
            const data = await res.json();
            alert('✅ ' + data.message);
            loadExams();
        } catch (e) {
            alert('❌ 删除失败');
        }
    }

    // 🌟 加载提交记录
    async function loadSubmissions() {
        const examCode = document.getElementById('filter-exam').value;
        try {
            const url = examCode ? `/api/admin/submissions?exam_code=${examCode}` : '/api/admin/submissions';
            const res = await fetch(url);
            const data = await res.json();
            const container = document.getElementById('submission-list');

            container.innerHTML = data.submissions.map(s => `
                <div class="submission-row" style="display: flex; align-items: center; gap: 12px; padding: 12px; background: #1e1e2f; border-radius: 8px;">
                    <span style="font-size: 20px;">👤</span>
                    <div style="flex: 1;">
                        <div style="font-weight: 500;">${s.username}</div>
                        <div style="font-size: 11px; color: #6b7280;">${s.exam_title || s.exam_code}</div>
                    </div>
                    <div style="text-align: right;">
                        <div style="color: #10b981; font-weight: bold;">客观: ${s.obj_score?.toFixed(1) || 0}</div>
                        <div style="color: #a5b4fc; font-size: 12px;">主观: ${s.subj_score || '待批改'}</div>
                    </div>
                    <div style="font-size: 11px; color: #6b7280;">${s.submit_time?.split('T')[0] || ''}</div>
                </div>
            `).join('') || '<p style="color: #6b7280; text-align: center;">暂无提交记录</p>';
        } catch (e) {
            console.error('加载提交记录失败:', e);
        }
    }

    // 🌟 批量AI批改
    async function batchGrade() {
        const btn = event.target;
        const examCode = document.getElementById('filter-exam').value;

        btn.innerText = '⏳ AI批改中...';
        btn.disabled = true;

        try {
            const url = examCode ? `/api/admin/batch_grade?exam_code=${examCode}` : '/api/admin/batch_grade';
            const res = await fetch(url, { method: 'POST' });
            const data = await res.json();
            alert(`✅ ${data.message}\n已批改 ${data.graded_count} 份试卷`);
            loadSubmissions();
        } catch (e) {
            alert('❌ 批量批改失败: ' + e.message);
        } finally {
            btn.innerText = '🤖 批量AI批改';
            btn.disabled = false;
        }
    }

    window.onload = () => { switchTemplate('neccs'); loadExams(); };
</script>
</body>
</html>
