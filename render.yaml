services:
  - type: web
    name: focusport
    env: python
    region: singapore
    plan: free
    buildCommand: |
      pip install -r requirements.txt
      cd focusport-frontend
      npm install --no-audit --no-fund
      npm run build
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: NODE_VERSION
        value: 18
